# Конфигурация для генерации иконок приложения
# Запуск: flutter pub run flutter_launcher_icons

flutter_launcher_icons:
  android: true
  ios: false  # iOS не настроен в этом проекте
  image_path: "assets/icon/icon.png"
  adaptive_icon_background: "#4CAF50"
  adaptive_icon_foreground: "assets/icon/icon_foreground.png"
  min_sdk_android: 21

# Примечание: для генерации иконок создайте:
# 1. assets/icon/icon.png (1024x1024 px) - основная иконка
# 2. assets/icon/icon_foreground.png (1024x1024 px) - иконка для адаптивных иконок Android

# Затем добавьте в pubspec.yaml:
# dev_dependencies:
#   flutter_launcher_icons: ^0.14.2
#
# И выполните:
# flutter pub run flutter_launcher_icons

