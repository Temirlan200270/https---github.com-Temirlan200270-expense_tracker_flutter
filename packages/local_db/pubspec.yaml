version: 0.1.0
publish_to: "none"

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  data_core:
    path: ../data_core
  drift: ^2.14.1
  drift_flutter: ^0.2.0
  path: ^1.9.0
  path_provider: ^2.1.4
  shared_models:
    path: ../shared_models
  uuid: ^4.5.1

dev_dependencies:
  build_runner: ^2.4.13
  drift_dev: ^2.14.1
  lints: ^3.0.0

