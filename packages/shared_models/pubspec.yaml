name: shared_models
description: Общие сущности и значения для всех пакетов Expense Tracker.
version: 0.1.0
publish_to: "none"

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  # Диапазон: CI (Flutter 3.24) может пинить 0.19.0, свежие SDK — 0.20.x
  intl: ">=0.19.0 <0.21.0"
  uuid: ^4.5.1
  # Коэффициент схожести (Dice) + bestMatch — дополняет Левенштейн в Matching Engine.
  string_similarity: ^2.1.0

dev_dependencies:
  lints: ^3.0.0
  test: ^1.25.0

