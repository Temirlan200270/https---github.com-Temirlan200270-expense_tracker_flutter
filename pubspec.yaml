
name: expense_tracker_flutter
description: A starter Flutter project for your Expense Tracker (Riverpod + Drift + fl_chart).
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.0.0"

dependencies:
  flutter:
    sdk: flutter
  # Иконки и шрифт для дерева иконок (устраняет предупреждение Material/Cupertino при сборке).
  cupertino_icons: ^1.0.8
  expense_tracker_app:
    path: packages/app

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.0
  drift_dev: ^2.8.0
  shared_models:
    path: packages/shared_models
  pedantic: ^1.11.0
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.1

flutter:
  uses-material-design: true
  assets:
    - assets/translations/
    - assets/images/

# Генерация иконок: dart run flutter_launcher_icons
# Сплэш: dart run flutter_native_splash:create
flutter_launcher_icons:
  android: true
  ios: false
  image_path: assets/images/app_icon.png
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: assets/images/app_icon_foreground.png
  min_sdk_android: 21

flutter_native_splash:
  color: "#FFFFFF"
  image: assets/images/splash_logo.png
  android_12:
    image: assets/images/splash_logo.png
    color: "#FFFFFF"
